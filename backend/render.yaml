services:
  - type: web
    name: hire-tracker-backend
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn hiretracker.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        value: change-me-in-production
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: hire-tracker-backend.onrender.com
      - key: CORS_ALLOWED_ORIGINS
        value: http://localhost:5173,https://your-frontend-domain.com
      - key: CSRF_TRUSTED_ORIGINS
        value: http://localhost:5173,https://your-frontend-domain.com
